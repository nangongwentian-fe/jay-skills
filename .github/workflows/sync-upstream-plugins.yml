name: Sync upstream plugins

on:
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sync-upstream-plugins
  cancel-in-progress: false

jobs:
  sync:
    name: Sync ${{ matrix.plugin }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        plugin:
          - taste-skill
          - code-honor-skill
          - andrej-karpathy-skills
          - emilkowalski-skills

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync plugin
        id: sync
        env:
          PLUGIN: ${{ matrix.plugin }}
        shell: bash
        run: |
          set -euo pipefail
          output_file="$RUNNER_TEMP/sync-output.txt"
          python scripts/sync_upstream_plugins.py sync --plugin "$PLUGIN" | tee "$output_file"
          cat "$output_file" >> "$GITHUB_STEP_SUMMARY"
          if git diff --quiet -- "plugins/$PLUGIN"; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate marketplace plugins
        run: python scripts/validate_plugins.py

      - name: Create or update pull request
        if: steps.sync.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PLUGIN: ${{ matrix.plugin }}
        shell: bash
        run: |
          set -euo pipefail
          branch="automation/sync-$PLUGIN"
          title="chore: 同步 $PLUGIN 上游更新"
          body_file="$RUNNER_TEMP/pr-body.md"

          {
            echo "由定时同步 workflow 自动生成。"
            echo
            echo '```text'
            cat "$RUNNER_TEMP/sync-output.txt"
            echo '```'
            echo
            echo "已执行：\`python scripts/validate_plugins.py\`"
            echo
            echo "合并前必须人工审查上游指令、脚本和本地补丁差异。"
          } > "$body_file"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$branch"
          git add --all -- "plugins/$PLUGIN"
          git commit -m "$title"
          git push --force-with-lease origin "HEAD:$branch"

          pr_number="$(gh pr list --base main --head "$branch" --state open --json number --jq '.[0].number // empty')"
          if [[ -z "$pr_number" ]]; then
            gh pr create --base main --head "$branch" --title "$title" --body-file "$body_file"
          else
            gh pr edit "$pr_number" --title "$title" --body-file "$body_file"
          fi
